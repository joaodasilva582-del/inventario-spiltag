<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a51c30">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Inventário Spiltag</title>
    
    <style>
        :root { --border: #000; --header-bg: #e9e9e9; --accent: #a51c30; --btn-grey: #666666; --btn-blue: #0056b3; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }

        /* TELA DE LOGIN */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f4f4f4; display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 350px;
            text-align: center; border-top: 6px solid var(--accent);
        }
        .login-box h1 { color: var(--accent); margin: 0 0 5px 0; font-size: 28px; letter-spacing: 2px; font-weight: bold; }
        .login-box p { font-size: 12px; color: #666; margin-bottom: 20px; font-weight: bold; }
        
        .login-box input {
            width: 100% !important; padding: 12px !important; margin: 10px 0 !important; 
            border: 1px solid #aaa !important; border-radius: 6px !important; 
            box-sizing: border-box !important; font-size: 16px !important;
            background-color: #ffffff !important; display: block !important;
            outline: none !important;
        }
        
        .btn-login {
            width: 100%; padding: 14px; background-color: var(--accent);
            color: white; border: none; border-radius: 6px; cursor: pointer;
            font-weight: bold; font-size: 16px; margin-top: 10px;
        }

        /* CONTEÚDO PRINCIPAL */
        #app-content { display: none; padding: 5px; background-color: #fff; }

        .no-print { margin-bottom: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 10px; }
        .btn-pdf { padding: 10px 18px; cursor: pointer; border: 1px solid #000; background-color: var(--accent); color: white; font-weight: bold; border-radius: 4px; }
        .btn-clear { padding: 10px 18px; cursor: pointer; border: 1px solid #000; background-color: var(--btn-grey); color: white; font-weight: bold; border-radius: 4px; }
        .btn-email { padding: 10px 18px; cursor: pointer; border: 1px solid #000; background-color: var(--btn-blue); color: white; font-weight: bold; border-radius: 4px; }
        
        .container { width: 100%; overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; min-width: 1000px; table-layout: fixed; } 
        th, td { border: 1px solid var(--border); padding: 4px 2px; text-align: center; word-wrap: break-word; }
        .bg-grey { background-color: var(--header-bg); font-weight: bold; }
        .bg-spiltag { background-color: var(--accent); color: white; font-weight: bold; }
        .editable { background-color: #fffdec; border: 1px solid #ccc !important; }
        input[type="number"], input[type="text"] { width: 95%; border: none; text-align: center; background: transparent; font-size: 13px; font-weight: bold; }
        .res-val { font-weight: bold; font-size: 14px; }

        /* MODAL DE AVISO PERSONALIZADO */
        #custom-alert {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 10000; align-items: center; justify-content: center;
        }
        .alert-content {
            background: white; padding: 25px; border-radius: 10px; text-align: center;
            max-width: 400px; width: 85%; border-top: 8px solid var(--accent);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        .alert-content h2 { color: var(--accent); margin-top: 0; }
        .alert-content p { color: #333; font-weight: bold; margin: 20px 0; line-height: 1.4; }
        
        .alert-buttons { display: flex; gap: 10px; justify-content: center; }
        .btn-alert-ok { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-alert-cancel { background: var(--btn-grey); color: white; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 15px; }

        /* ESTILOS DE LOGO E CÓDIGOS */
        .logo-text { font-weight: bold; font-size: 30px !important; color: var(--accent) !important; }
        .sub-cod { font-size: 10px !important; font-weight: normal !important; color: #ddd !important; display: block; }

        @media print {
            @page { size: portrait; margin: 0.5cm; }
            .no-print, #login-screen, #custom-alert { display: none !important; }
            body { margin: 0; padding: 0; zoom: 75%; } 
            .container { overflow: visible !important; }
            table { min-width: 100% !important; width: 100% !important; table-layout: fixed !important; font-size: 10px !important; }
            th, td { padding: 2px 1px !important; border: 1px solid #000 !important; }
            .bg-spiltag { background-color: var(--accent) !important; -webkit-print-color-adjust: exact; color: white !important; }
            .bg-grey { background-color: var(--header-bg) !important; -webkit-print-color-adjust: exact; }
            .sub-cod { color: white !important; -webkit-print-color-adjust: exact; font-size: 9px !important; }
        }
    </style>
</head>
<body>

    <div id="custom-alert">
        <div class="alert-content">
            <h2 id="alert-title">Atenção!</h2>
            <p id="alert-msg"></p>
            <div class="alert-buttons" id="alert-btns"></div>
        </div>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <h1>SPILTAG</h1>
            <p>INVENTÁRIO DE RESINAS</p>
            <input type="text" id="user_in" placeholder="Usuário" autocomplete="off">
            <input type="password" id="pass_in" placeholder="Senha">
            <button class="btn-login" onclick="validarAcesso()">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div id="app-content">
        <div class="no-print">
            <button class="btn-pdf" onclick="window.print()">IMPRIMIR PDF</button>
            <button class="btn-email" onclick="enviarEmail()">ENVIAR E-MAIL</button>
            <button class="btn-clear" onclick="confirmarLimpeza()">LIMPAR TUDO</button>
        </div>

        <div class="container">
            <table>
                <colgroup>
                    <col style="width: 15%;"> <col style="width: 11%;"> <col style="width: 5%;"> 
                    <col style="width: 8%;"> <col style="width: 4.4%;"><col style="width: 4.4%;"><col style="width: 4.4%;"><col style="width: 4.4%;"> 
                    <col style="width: 4.4%;"><col style="width: 4.4%;"><col style="width: 4.4%;"><col style="width: 4.4%;"> 
                    <col style="width: 5.3%;"><col style="width: 5.3%;"><col style="width: 5.3%;"> 
                </colgroup>
                <tr>
                    <td rowspan="4" class="logo-text">SPILTAG</td>
                    <td colspan="2" id="current-time">--/--/---- --:--:--</td>
                    <td class="bg-spiltag">SALDO</td>
                    <td class="bg-spiltag" colspan="4">PET VIRGEM <span class="sub-cod">(0010006)</span></td>
                    <td class="bg-spiltag" colspan="4">PCR 0T <span class="sub-cod">(0010048)</span></td>
                    <td class="bg-spiltag" colspan="3">PCR 10T <span class="sub-cod">(0010030)</span></td>
                </tr>
                <tr>
                    <td class="bg-spiltag" colspan="2">RESPONSÁVEL</td>
                    <td class="bg-spiltag">SISTEMA</td>
                    <td colspan="4"><input type="number" id="sys_v" class="editable res-val" oninput="calc()" onkeydown="handleEnter(event, 'sys_0t')" placeholder=""></td>
                    <td colspan="4"><input type="number" id="sys_0t" class="editable res-val" oninput="calc()" onkeydown="handleEnter(event, 'sys_10t')" placeholder=""></td>
                    <td colspan="3"><input type="number" id="sys_10t" class="editable res-val" oninput="calc()" onkeydown="handleEnter(event, 'peso-0')" placeholder=""></td>
                </tr>
                <tr>
                    <td rowspan="2" colspan="2"><input type="text" id="resp" class="editable" placeholder="Seu Nome"></td>
                    <td class="bg-spiltag">SOMA</td>
                    <td colspan="4" id="som_v" class="res-val">0.00</td>
                    <td colspan="4" id="som_0t" class="res-val">0.00</td>
                    <td colspan="3" id="som_10t" class="res-val">0.00</td>
                </tr>
                <tr>
                    <td class="bg-spiltag">DIF.</td>
                    <td colspan="4" id="dif_v" class="res-val">0.00</td>
                    <td colspan="4" id="dif_0t" class="res-val">0.00</td>
                    <td colspan="3" id="dif_10t" class="res-val">0.00</td>
                </tr>
                <tr class="bg-grey">
                    <th rowspan="2">Ponto</th><th rowspan="2">Local</th><th rowspan="2">Cap.</th><th rowspan="2">Peso</th>
                    <th colspan="4">MIX PCR 0T</th><th colspan="4">MIX PCR 10T</th>
                    <th rowspan="2">PET</th><th rowspan="2">0T</th><th rowspan="2">10T</th>
                </tr>
                <tr class="bg-grey" style="font-size: 12px;">
                    <th>25%</th><th>50%</th><th>75%</th><th>100%</th>
                    <th>25%</th><th>50%</th><th>75%</th><th>100%</th>
                </tr>
                <tbody id="table-body"></tbody>
                <tr class="bg-grey">
                    <td colspan="12" style="text-align:right; font-weight:bold;">SOMA TOTAL:</td>
                    <td id="tot_v" class="res-val">0.00</td><td id="tot_0t" class="res-val">0.00</td><td id="tot_10t" class="res-val">0.00</td>
                </tr>
            </table>
        </div>
    </div>

    <script>
        const itens = [
            {p: "Bag suspenso A + caixa", l: "Abastecimento", c: "1575", type: "PET"},
            {p: "Bag suspenso B + caixa", l: "Abastecimento", c: "1575", type: "PET"},
            {p: "Bag suspenso C + caixa", l: "Abastecimento", c: "1575", type: "PET"},
            {p: "Bag suspenso D + caixa", l: "Abastecimento", c: "1575", type: "PET"},
            {p: "Desumid. 01", l: "Sopro", c: "240", type: "PET"},
            {p: "Desumid. 02", l: "Sopro", c: "480", type: "PET"},
            {p: "Desumid. 03", l: "Sopro", c: "160", type: "PET"},
            {p: "Desumid. 04", l: "Sopro", c: "320", type: "PET"},
            {p: "Desumid. 05", l: "Sopro", c: "320", type: "PET"},
            {p: "Desumid. 06", l: "Sopro", c: "160", type: "MIX"},
            {p: "Desumid. 07", l: "Sopro", c: "160", type: "MIX"},
            {p: "Desumid. 08", l: "Sopro", c: "160", type: "MIX"},
            {p: "Desumid. 09", l: "Sopro", c: "160", type: "MIX"},
            {p: "Desumid. 10", l: "Sopro", c: "160", type: "MIX"},
            {p: "Desumid. 11", l: "Sopro", c: "160", type: "MIX"},
            {p: "Desumid. 12", l: "Sopro", c: "160", type: "MIX"},
            {p: "Desumid. 13", l: "Sopro", c: "640", type: "PET"},
            {p: "Desumid. 14", l: "Sopro", c: "160", type: "MIX"},
            {p: "Desumid. 16", l: "Sopro", c: "160", type: "MIX"},
            {p: "Desumid. 17", l: "Sopro", c: "240", type: "PET"},
            {p: "Desumid. 18", l: "Sopro", c: "480", type: "PET"},
            {p: "Caçamba 01", l: "Sopro", c: "Pesag.", type: "MIX"},
            {p: "Caçamba 02", l: "Sopro", c: "Pesag.", type: "MIX"},
            {p: "Caçamba 03", l: "Sopro", c: "Pesag.", type: "MIX"},
            {p: "Caçamba 04", l: "Sopro", c: "Pesag.", type: "MIX"},
            {p: "Caçamba 05", l: "Sopro", c: "Pesag.", type: "MIX"},
            {p: "Caçamba 06", l: "Sopro", c: "Pesag.", type: "MIX"},
            {p: "Bags PET VI 0,80", l: "Sopro", c: "Pesag.", type: "PET"},
            {p: "Bags PCR 0T", l: "Sopro", c: "Pesag.", type: "0T"},
            {p: "Bags PCR 10T", l: "Sopro", c: "Pesag.", type: "10T"},
            {p: "Desumid. 15", l: "Dinamo", c: "240", type: "MIX"},
            {p: "Bags avulsos (dinamo)", l: "Dinamo", c: "Pesag.", type: "MIX"}
        ];

        function mostrarAlerta(msg, tipo = 'aviso') {
            const modal = document.getElementById('custom-alert');
            const title = document.getElementById('alert-title');
            const msgEl = document.getElementById('alert-msg');
            const btnArea = document.getElementById('alert-btns');
            msgEl.innerText = msg;
            btnArea.innerHTML = "";
            if (tipo === 'confirmar') {
                title.innerText = "Confirmar Ação";
                btnArea.innerHTML = `<button class="btn-alert-ok" onclick="executarLimpeza()">SIM, LIMPAR</button><button class="btn-alert-cancel" onclick="fecharAlerta()">CANCELAR</button>`;
            } else {
                title.innerText = "Atenção!";
                btnArea.innerHTML = `<button class="btn-alert-ok" onclick="fecharAlerta()">ENTENDI</button>`;
            }
            modal.style.display = 'flex';
        }

        function fecharAlerta() { document.getElementById('custom-alert').style.display = 'none'; }
        function confirmarLimpeza() { mostrarAlerta("Deseja realmente limpar todos os dados do inventário? Essa ação não pode ser desfeita.", 'confirmar'); }
        function executarLimpeza() {
            document.querySelectorAll('.peso').forEach(i => i.value = "");
            document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
            document.getElementById('sys_v').value = document.getElementById('sys_0t').value = document.getElementById('sys_10t').value = "";
            document.getElementById('resp').value = "";
            calc();
            fecharAlerta();
        }

        function render() {
            const body = document.getElementById('table-body');
            body.innerHTML = "";
            itens.forEach((it, i) => {
                const tr = document.createElement('tr');
                const isMix = it.type === "MIX";
                const nextId = (i < itens.length - 1) ? `peso-${i+1}` : null;
                tr.innerHTML = `
                    <td style="text-align:left;">${it.p}</td><td>${it.l}</td><td>${it.c}</td>
                    <td><input type="number" class="peso editable" id="peso-${i}" oninput="calc()" onkeydown="handleEnter(event, ${nextId ? `'${nextId}'` : 'null'})" placeholder=""></td>
                    ${[25,50,75,100].map(v => `<td><input type="checkbox" name="m${i}" onclick="unck(this, ${i});calc()" data-type="0t" data-val="${v}" ${!isMix?'disabled':''}></td>`).join('')}
                    ${[25,50,75,100].map(v => `<td><input type="checkbox" name="m${i}" onclick="unck(this, ${i});calc()" data-type="10t" data-val="${v}" ${!isMix?'disabled':''}></td>`).join('')}
                    <td class="rv">0.0</td><td class="r0">0.0</td><td class="r10">0.0</td>
                `;
                body.appendChild(tr);
            });
        }

        function handleEnter(event, nextId) {
            if (event.key === "Enter") {
                event.preventDefault();
                if (nextId) document.getElementById(nextId).focus();
                else { calc(); const sV = document.getElementById('sys_v').value; const s0 = document.getElementById('sys_0t').value; const s10 = document.getElementById('sys_10t').value; if (!sV || !s0 || !s10) { mostrarAlerta("Contagem finalizada! Agora informe o Saldo no Sistema no topo da tabela."); window.scrollTo({top: 0, behavior: 'smooth'}); } else { mostrarAlerta("Contagem finalizada com sucesso!"); } }
            }
        }

        function unck(el, index) { 
            const pesoInput = document.getElementById(`peso-${index}`);
            if (el.checked && (!pesoInput.value || parseFloat(pesoInput.value) <= 0)) {
                el.checked = false;
                mostrarAlerta("Informe o peso encontrado neste ponto antes de selecionar a porcentagem do Mix.");
                return;
            }
            document.getElementsByName(el.name).forEach(c => { if(c !== el) c.checked = false; }); 
        }

        function calc() {
            let tV = 0, t0 = 0, t10 = 0;
            document.querySelectorAll('#table-body tr').forEach((tr, i) => {
                const p = parseFloat(tr.querySelector('.peso').value) || 0;
                const chk = tr.querySelector('input:checked');
                let v = 0, p0 = 0, p10 = 0;
                if (itens[i].type === "PET") v = p;
                else if (itens[i].type === "0T") p0 = p;
                else if (itens[i].type === "10T") p10 = p;
                else if (itens[i].type === "MIX" && chk) {
                    let val = parseInt(chk.dataset.val)/100;
                    if(chk.dataset.type === '0t') { p0 = p * val; v = p - p0; }
                    else { p10 = p * val; v = p - p10; }
                } else { v = p; }
                tr.querySelector('.rv').innerText = v.toFixed(1);
                tr.querySelector('.r0').innerText = p0.toFixed(1);
                tr.querySelector('.r10').innerText = p10.toFixed(1);
                tV += v; t0 += p0; t10 += p10;
            });
            document.getElementById('tot_v').innerText = document.getElementById('som_v').innerText = tV.toFixed(2);
            document.getElementById('tot_0t').innerText = document.getElementById('som_0t').innerText = t0.toFixed(2);
            document.getElementById('tot_10t').innerText = document.getElementById('som_10t').innerText = t10.toFixed(2);
            const sysV = parseFloat(document.getElementById('sys_v').value) || 0;
            const sys0 = parseFloat(document.getElementById('sys_0t').value) || 0;
            const sys10 = parseFloat(document.getElementById('sys_10t').value) || 0;
            const dV = tV - sysV; const d0 = t0 - sys0; const d10 = t10 - sys10;
            document.getElementById('dif_v').innerText = dV.toFixed(2);
            document.getElementById('dif_0t').innerText = d0.toFixed(2);
            document.getElementById('dif_10t').innerText = d10.toFixed(2);
            [ {id:'dif_v', v:dV}, {id:'dif_0t', v:d0}, {id:'dif_10t', v:d10} ].forEach(d => {
                const el = document.getElementById(d.id);
                el.style.color = d.v < 0 ? '#d00000' : (d.v > 0 ? '#008000' : '#000');
            });
        }

        function validarAcesso() {
            const u = document.getElementById('user_in').value;
            const p = document.getElementById('pass_in').value;
            if (u === "producao" && p === "Spil@2026") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                render();
                setInterval(() => { document.getElementById('current-time').innerText = new Date().toLocaleString(); }, 1000);
            } else { alert("Acesso Negado!"); }
        }

        function enviarEmail() {
            const resp = document.getElementById('resp').value;
            const sysV = document.getElementById('sys_v').value;
            const sys0 = document.getElementById('sys_0t').value;
            const sys10 = document.getElementById('sys_10t').value;
            if (!resp) { mostrarAlerta("Preencha o seu nome no campo Responsável."); return; }
            if (!sysV || !sys0 || !sys10) { mostrarAlerta("Preencha os três saldos do sistema no topo da tabela."); window.scrollTo({top: 0, behavior: 'smooth'}); return; }
            let fP = false; document.querySelectorAll('.peso').forEach(i => { if (i.value === "") fP = true; });
            if (fP) { mostrarAlerta("Existem pontos de contagem sem peso informado na tabela."); return; }
            const dt = document.getElementById('current-time').innerText;
            const tV = document.getElementById('tot_v').innerText;
            const t0 = document.getElementById('tot_0t').innerText;
            const t10 = document.getElementById('tot_10t').innerText;
            const dV = document.getElementById('dif_v').innerText;
            const d0 = document.getElementById('dif_0t').innerText;
            const d10 = document.getElementById('dif_10t').innerText;
            const ass = `Resumo de Inventário - ${resp}`;
            const corpo = `Relatório de Inventário de Resinas%0D%0AData/Hora: ${dt}%0D%0AResponsável: ${resp}%0D%0A%0D%0A1. PET VIRGEM (0010006)%0D%0A- Físico: ${tV} KG%0D%0A- Sistema: ${sysV} KG%0D%0A- Diferença: ${dV} KG%0D%0A%0D%0A2. PCR 0T (0010048)%0D%0A- Físico: ${t0} KG%0D%0A- Sistema: ${sys0} KG%0D%0A- Diferença: ${d0} KG%0D%0A%0D%0A3. PCR 10T (0010030)%0D%0A- Físico: ${t10} KG%0D%0A- Sistema: ${sys10} KG%0D%0A- Diferença: ${d10} KG%0D%0A%0D%0A-------------------------------------------%0D%0AEnviado via App Inventário Spiltag.`;
            window.location.href = `mailto:joao.pedroso@spiltag.com?subject=${encodeURIComponent(ass)}&body=${corpo}`;
        }
    </script>
    <script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
    </script>

</body>
</html>
